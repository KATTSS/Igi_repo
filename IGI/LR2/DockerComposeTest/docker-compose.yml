services:
  db:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - MyNet

  backend:
    image: kattss/payroll-service-test:backend
    build:
      context: ./Employee-Payroll-Salary-App-Angular-11-MEAN-Stack/Server
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - MONGO_URI=mongodb://db:27017/payroll-db
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    networks:
      - MyNet

  frontend:
    image: kattss/payroll-service-test:frontend
    build:
      context: ./Employee-Payroll-Salary-App-Angular-11-MEAN-Stack/Client/Angular
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - MyNet

volumes:
  mongodb_data:
  backend_logs:
  backend_uploads:


networks:
  MyNet:
    driver: bridge
