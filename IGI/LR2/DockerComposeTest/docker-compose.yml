services:
  db:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - payroll-network

  backend:
    build:
      context: ./Employee-Payroll-Salary-App-Angular-11-MEAN-Stack/Server
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - MONGO_URI=mongodb://db:27017/payroll-db
    volumes:
      - ./Employee-Payroll-Salary-App-Angular-11-MEAN-Stack/Server:/app
      - /app/node_modules
    networks:
      - payroll-network

  frontend:
    build:
      context: ./Employee-Payroll-Salary-App-Angular-11-MEAN-Stack/Client/Angular
      dockerfile: Dockerfile.prod
    container_name: angular-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - payroll-network

volumes:
  mongodb_data:


networks:
  payroll-network:
    driver: bridge
